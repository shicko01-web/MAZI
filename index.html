<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המתנה של מזי - סיפור יום הולדת</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    //fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce-slow { animation: bounce-slow 4s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                calendar: <path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />,
                utensils: <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />,
                arrowRight: <path d="M9 18l6-6-6-6" />,
                arrowLeft: <path d="M15 18l-6-6 6-6" />,
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const storyData = [
            {
                type: 'intro',
                title: "אתונה של מזי",
                subtitle: "מתנת יום הולדת לאישתי המופלאה",
                content: "מזי אהובתי, הסיפור הזה הוא רק ההתחלה של המסע שלנו. הוא מוקדש לך, לכבוד יום הולדתך, כהבטחה לרגעים חדשים שנחרוט יחד בסמטאותיה של אתונה.",
                imageUrl: "https://images.unsplash.com/photo-1594145037190-2646d88989e2?auto=format&fit=crop&w=1200&q=80",
                fallbackColor: "bg-amber-50"
            },
            {
                day: "רביעי, 13.5",
                title: "נחיתה חגיגית",
                narrative: "כשהגלגלים יגעו במסלול, האוויר החם של יוון יקבל את פנינו בחיבוק. הערב הראשון יתחיל בטעם של סופלקי תחת שמיים זרועי כוכבים.",
                imageUrl: "https://images.unsplash.com/photo-1541336032412-224b17385d1e?auto=format&fit=crop&w=1200&q=80",
                fallbackColor: "bg-indigo-900"
            },
            {
                day: "חמישי, 14.5",
                title: "הלב ההיסטורי והבוהמה",
                narrative: "הבוקר יעלה על האקרופוליס, ואנחנו נצעד בשבילים הירוקים של ת'יסיו. במאי, הפריחה שם היא שירה של הטבע.",
                imageUrl: "https://images.unsplash.com/photo-1603565816030-6b389eafc742?auto=format&fit=crop&w=1200&q=80",
                fallbackColor: "bg-blue-100"
            },
            {
                day: "שישי, 15.5",
                title: "שווקים ואמנות מוטורית",
                narrative: "היום הזה מוקדש לחושים שלך, מזי. שוק ורוואקיוס יפתח בפנינו עולם של צבעים וריחות.",
                imageUrl: "https://images.unsplash.com/photo-1555990538-4f2430030093?auto=format&fit=crop&w=1200&q=80",
                special: "spices",
                fallbackColor: "bg-orange-50"
            },
            {
                day: "שבת, 16.5",
                title: "פיראוס והריביירה הכחולה",
                narrative: "הים קורא לנו. נצא אל מיקרולימנו, שם המים כחולים יותר והחיים שקטים יותר.",
                imageUrl: "https://images.unsplash.com/photo-1548685913-fe6678babeac?auto=format&fit=crop&w=1200&q=80",
                fallbackColor: "bg-cyan-50"
            },
            {
                day: "ראשון, 17.5",
                title: "טקסים וטבע עירוני",
                narrative: "יום אחרון ונינוח. נטייל בגנים הלאומיים בין שבילים מוצלים וצמחייה עבותה שנושמת חיים.",
                imageUrl: "https://images.unsplash.com/photo-1574340316049-3669046c827c?auto=format&fit=crop&w=1200&q=80",
                fallbackColor: "bg-green-50"
            },
            {
                type: 'outro',
                title: "הקדשה מכל הלב",
                content: "מוגש באהבה רבה ובהערצה ליום ההולדת - מתנה רגעית לציון 37 שנות הכרות שמהן 36 בנישואין. שיקו, בעלך...",
                imageUrl: "https://images.unsplash.com/photo-1504512485060-723c34008436?auto=format&fit=crop&w=1200&q=80",
                fallbackColor: "bg-orange-100"
            }
        ];

        const App = () => {
            const [currentPage, setCurrentPage] = React.useState(0);
            const currentData = storyData[currentPage];

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 md:p-8" dir="rtl">
                    <div className="max-w-6xl w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col lg:flex-row min-h-[650px] border border-slate-100">
                        <div className={`w-full lg:w-1/2 relative min-h-[400px] lg:min-h-full overflow-hidden ${currentData.fallbackColor}`}>
                            <img src={currentData.imageUrl} className="w-full h-full object-cover fade-in" alt={currentData.title} />
                        </div>
                        <div className="w-full lg:w-1/2 p-10 lg:p-16 flex flex-col justify-between bg-white">
                            <div className="fade-in">
                                {currentData.day && (
                                    <div className="flex items-center gap-2 text-blue-500 font-bold text-sm mb-6 uppercase tracking-[0.2em]">
                                        <Icon name="calendar" size={18} />
                                        <span>{currentData.day}</span>
                                    </div>
                                )}
                                <h1 className="text-4xl lg:text-6xl font-black text-slate-800 mb-8 leading-[1.1] text-right">
                                    {currentData.title}
                                </h1>
                                {currentData.subtitle && (
                                    <h2 className="text-2xl text-blue-400 mb-8 font-semibold text-right border-r-4 border-blue-100 pr-4 italic">
                                        {currentData.subtitle}
                                    </h2>
                                )}
                                <div className="text-xl lg:text-2xl text-slate-600 leading-relaxed whitespace-pre-line text-right font-light">
                                    {currentData.content || currentData.narrative}
                                </div>
                            </div>
                            <div className="mt-16 pt-10 border-t border-slate-100 flex items-center justify-between">
                                <button onClick={() => setCurrentPage(prev => Math.max(0, prev - 1))} disabled={currentPage === 0} className={`p-4 rounded-2xl transition-all ${currentPage === 0 ? 'text-slate-200' : 'text-slate-400 hover:bg-blue-50 hover:text-blue-600'}`}>
                                    <Icon name="arrowRight" size={32} />
                                </button>
                                <div className="flex gap-3">
                                    {storyData.map((_, i) => (
                                        <button key={i} onClick={() => setCurrentPage(i)} className={`h-2 transition-all duration-500 rounded-full ${i === currentPage ? 'w-12 bg-blue-500' : 'w-2 bg-slate-200'}`} />
                                    ))}
                                </div>
                                <button onClick={() => setCurrentPage(prev => Math.min(storyData.length - 1, prev + 1))} disabled={currentPage === storyData.length - 1} className={`p-4 rounded-2xl transition-all ${currentPage === storyData.length - 1 ? 'text-slate-200' : 'text-slate-400 hover:bg-blue-50 hover:text-blue-600'}`}>
                                    <Icon name="arrowLeft" size={32} />
                                </button>
                            </div>
                        </div>
                    </div>
                    <div className="mt-10 text-slate-400 text-sm font-medium flex items-center gap-2 opacity-60">
                        <Icon name="heart" size={14} className="fill-slate-400" />
                        <span>מיוצר באהבה עבור מזי ושיקו
