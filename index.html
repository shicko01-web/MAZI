<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>החתונה של מזי - סיפור יום הולדת</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const storyData = [
            { title: "מזי היקרה, הכל מתחיל בחיוך שלך", imageUrl: "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=1200&q=80" },
            { title: "המשפחה היא הלב של הכל", imageUrl: "https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=1200&q=80" },
            { title: "רגעים של אושר וצחוק", imageUrl: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1200&q=80" },
            { title: "החברים שתמיד שם בשבילך", imageUrl: "https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=1200&q=80" },
            { title: "המסע המשותף שלנו", imageUrl: "https://images.unsplash.com/photo-1516589174184-c68526614488?auto=format&fit=crop&w=1200&q=80" },
            { title: "מאחלים לך עוד שנים של אור", imageUrl: "https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?auto=format&fit=crop&w=1200&q=80" },
            { title: "יום הולדת שמח מזי!", imageUrl: "https://images.unsplash.com/photo-1530103043960-ef38714abb15?auto=format&fit=crop&w=1200&q=80" }
        ];

        const App = () => {
            const [p, setP] = React.useState(0);
            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 flex flex-col items-center justify-center font-sans" dir="rtl">
                    <div className="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden fade-in">
                        <img src={storyData[p].imageUrl} className="w-full h-64 md:h-96 object-cover" alt={storyData[p].title} />
                        <div className="p-8 text-center">
                            <h1 className="text-3xl md:text-4xl font-bold text-slate-800 mb-8">{storyData[p].title}</h1>
                            <div className="flex justify-between items-center mt-8 border-t pt-8">
                                <button 
                                    onClick={() => setP(Math.max(0, p - 1))} 
                                    disabled={p === 0}
                                    className="px-6 py-2 bg-blue-500 text-white rounded-full disabled:opacity-30 hover:bg-blue-600 transition-colors"
                                >הקודם</button>
                                <div className="flex gap-2">
                                    {storyData.map((_, i) => (
                                        <div key={i} className={`w-3 h-3 rounded-full ${i === p ? 'bg-blue-500' : 'bg-slate-200'}`} />
                                    ))}
                                </div>
                                <button 
                                    onClick={() => setP(Math.min(storyData.length - 1, p + 1))} 
                                    disabled={p === storyData.length - 1}
                                    className="px-6 py-2 bg-blue-500 text-white rounded-full disabled:opacity-30 hover:bg-blue-600 transition-colors"
                                >הבא</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
